<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Buzzer</title>
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
<div class="player-wrap">
  <div class="player-card">

    <!-- Join -->
    <div id="view-join">
      <h1>QuizMaster</h1>

      <div class="otp-label">Room code</div>
      <div class="otp-boxes">
        {% for char in code %}
        <input class="otp-box prefilled" value="{{ char }}" type="text" readonly tabindex="-1">
        {% endfor %}
      </div>

      <div class="field-label">Your name</div>
      <input id="name-input" type="text" placeholder="Your name" maxlength="30" autocomplete="off" spellcheck="false">
      <p class="error-msg hidden" id="join-error"></p>
      <button id="join-btn" class="btn-primary">Join Room</button>
    </div>

    <!-- Waiting -->
    <div id="view-waiting" class="hidden">
      <h1>You're in!</h1>
      <p class="status-msg">Waiting for the host to start the quiz…</p>
    </div>

    <!-- Buzzer -->
    <div id="view-buzzer" class="hidden">
      <button id="buzz-btn" class="buzz-btn">BUZZ</button>
    </div>

    <!-- Queue position -->
    <div id="view-position" class="hidden">
      <ol class="buzz-queue-list" id="player-queue-list"></ol>
      <p class="position-sub">Wait for the host to call on you</p>
    </div>

  </div>
</div>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>const JOIN_CODE = "{{ code }}";</script>
<script src="/static/js/player.js"></script>
</body>
</html>
